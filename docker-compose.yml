services:
  database:
    image: postgres:15-alpine
    container_name: orbitto-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orbitto-redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: orbitto-backend
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
      APP_BASE_URL: ${FRONTEND_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${FRONTEND_URL}
    expose: # ← было ports, стало expose
      - "${BACKEND_PORT}"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:alpine
    container_name: orbitto-caddy
    ports:
      - "${BACKEND_PORT}:443"
    environment:
      - BACKEND_PORT=${BACKEND_PORT} # ← чтобы использовать в Caddyfile
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_certs:/root/.local/share/caddy
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_certs:
